<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контактна форма</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f9;
            margin: 0;
            padding: 20px;
        }
        .form-container {
            max-width: 500px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #34495e;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #3498db;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
        }
        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Свържете се с нас</h2>
    
    <form action="#" method="POST">
        
        <label for="ime">Име:</label>
        <input type="text" id="ime" name="ime" placeholder="Вашето име" required>
        
        <label for="email">Имейл адрес:</label>
        <input type="email" id="email" name="email" placeholder="вашият@email.com" required>
        
        <label for="telefon">Телефон (по желание):</label>
        <input type="tel" id="telefon" name="telefon" placeholder="0888 123 456">
        
        <label for="tema">Тема:</label>
        <select id="tema" name="tema" required>
            <option value="">Изберете тема...</option>
            <option value="запитване">Общо запитване</option>
            <option value="предложение">Предложение</option>
            <option value="жалба">Жалба</option>
            <option value="друго">Друго</option>
        </select>
        
        <label for="sabotka">Съобщение:</label>
        <textarea id="sabotka" name="sabotka" rows="6" placeholder="Напишете вашето съобщение тук..." required></textarea>
        
        <button type="submit">Изпрати съобщението</button>
    </form>
</div>

</body>
</html>
